<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>お手紙作成ページ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; background: #f8f8f8; font-family: 'Noto Serif JP', serif; min-height: 100vh; }

        /* 左サイドバー */
        .sidebar {
            width: 160px; height: 100vh; background: #fff; position: fixed; left: 0; top: 0;
            display: flex; flex-direction: column; gap: 20px; padding: 20px 10px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; z-index: 100; align-items: center;
        }

        .tool-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }

        /* 右側：メインエリア */
        .main-content { 
            margin-left: 160px; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }

        /* 修正：width: fit-content を追加して画像に合わせる */
        #canvas-container { 
            position: relative; 
            border: 1px solid #ddd; 
            background: white; 
            margin: 20px 0; 
            touch-action: none; 
            line-height: 0; 
            width: fit-content; 
        }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        #bg-image { display: block; max-width: 100%; height: auto; pointer-events: none; }

        /* 円形ボタン（便箋選択） */
        .card-selector { display: flex; flex-direction: column; gap: 15px; align-items: center; border-top: 1px solid #eee; padding-top: 20px; width: 100%; }
        .card-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: white; border: 2px solid #ccc; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif; font-weight: bold; font-size: 13px; transition: 0.3s; padding: 5px;
        }
        .card-btn.active { background: #4CAF50; color: white; border-color: #4CAF50; transform: scale(1.1); }

        /* ツールボタン */
        button.tool-btn { 
            width: 100%; padding: 12px 5px; font-weight: bold; border-radius: 8px; border: 1px solid #ccc;
            cursor: pointer; background: white; font-family: sans-serif; font-size: 14px;
        }
        button.tool-btn.active { background: #333; color: white; border-color: #333; }
        .btn-hand { border: 2px solid #2196F3 !important; color: #2196F3; } 
        .btn-hand.active { background: #2196F3 !important; color: white !important; }
        .btn-clear { color: #ff4d4d; border: 1px solid #ff4d4d !important; }
        .btn-save { background: #4CAF50 !important; color: white !important; border: none !important; margin-top: 10px; }

        #text-input-overlay {
            position: fixed; display: none; z-index: 1000; background: white; border: 2px solid #4CAF50;
            border-radius: 8px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #text-input-overlay textarea {
            width: 250px; height: 100px; border: 1px solid #eee; font-family: 'Noto Serif JP', serif; font-size: 16px; padding: 5px; outline: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="tool-group">
            <button id="pen-btn" class="tool-btn active" onclick="setMode('pen')">ペン 🖊️</button>
            <button id="text-btn" class="tool-btn" onclick="setMode('text')">テキスト ⌨️</button>
            <button id="eraser-btn" class="tool-btn" onclick="setMode('eraser')">消しゴム 🧽</button>
            <button class="tool-btn btn-clear" onclick="clearCanvas()">全消し 🗑️</button>
            <button id="hand-btn" class="tool-btn btn-hand" onclick="setMode('hand')">移動 🖐️</button>
            <button class="tool-btn btn-save" onclick="saveImage()">保存 ✨</button>
        </div>

        <div class="card-selector">
            <div style="font-size: 11px; color: #888;">カードを選択</div>
            <button class="card-btn active" onclick="changeCard('Card1.png', this)"><span>祝</span><span>🎉</span></button>
            <button class="card-btn" onclick="changeCard('Card2.png', this)"><span>怖</span><span>👻</span></button>
            <button class="card-btn" onclick="changeCard('Card10.png', this)"><span>白</span><span>✉️</span></button>
        </div>
    </div>

    <div class="main-content">
        <div id="canvas-container">
            <img id="bg-image" src="Card1.png" alt="便箋背景">
            <canvas id="drawing-canvas"></canvas>
        </div>
    </div>

    <div id="text-input-overlay">
        <textarea id="temp-text" placeholder="メッセージを入力..."></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 5px; margin-top: 5px;">
            <button onclick="closeTextInput(false)">戻る</button>
            <button style="background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 4px;" onclick="closeTextInput(true)">決定</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawing-canvas');
        const bgImg = document.getElementById('bg-image');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('text-input-overlay');
        const textarea = document.getElementById('temp-text');
        
        let drawing = false;
        let mode = 'pen';
        let textPos = { x: 0, y: 0 };
        const charSpacing = 4;

        bgImg.onload = () => { adjustCanvasSize(); initCtx(); };
        if (bgImg.complete) { adjustCanvasSize(); initCtx(); }

        // 修正：キャンバスとコンテナのサイズを画像に同期
        function adjustCanvasSize() {
            canvas.width = bgImg.naturalWidth;
            canvas.height = bgImg.naturalHeight;

            const rect = bgImg.getBoundingClientRect();
            canvas.style.width = rect.width + "px";
            canvas.style.height = rect.height + "px";

            const container = document.getElementById('canvas-container');
            container.style.width = rect.width + "px";
            container.style.height = rect.height + "px";
        }
        window.onresize = adjustCanvasSize;

        function changeCard(fileName, btnElement) {
            const savedData = canvas.toDataURL();
            bgImg.onload = () => {
                adjustCanvasSize();
                initCtx();
                const tempImg = new Image();
                tempImg.onload = () => { ctx.drawImage(tempImg, 0, 0); };
                tempImg.src = savedData;
            };
            bgImg.src = fileName;
            document.querySelectorAll('.card-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function initCtx() {
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            updatePenStyle();
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('hand-btn').classList.toggle('active', mode === 'hand');
            document.getElementById('pen-btn').classList.toggle('active', mode === 'pen');
            document.getElementById('text-btn').classList.toggle('active', mode === 'text');
            document.getElementById('eraser-btn').classList.toggle('active', mode === 'eraser');
            
            canvas.style.cursor = (mode === 'hand') ? 'grab' : 'crosshair';
            updatePenStyle();
        }

        function updatePenStyle() {
            ctx.globalCompositeOperation = (mode === 'eraser') ? 'destination-out' : 'source-over';
            ctx.strokeStyle = "#333";
            ctx.lineWidth = (mode === 'eraser') ? 30 : 4;
            ctx.font = "32px 'Noto Serif JP', serif";
            ctx.fillStyle = "#333";
        }

        function startDrawing(e) {
            if (mode === 'hand') return; 
            if (mode === 'text') { showTextInput(e); return; }
            drawing = true; draw(e);
        }
        function stopDrawing() { drawing = false; ctx.beginPath(); }

        function draw(e) {
            if (!drawing || mode === 'hand' || mode === 'text') return;
            e.preventDefault(); 
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function showTextInput(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            textPos = getMousePos(e);
            overlay.style.display = 'block';
            overlay.style.top = `${clientY}px`;
            overlay.style.left = `${clientX}px`;
            textarea.value = "";
            textarea.focus();
        }

        function closeTextInput(isSave) {
            if (isSave && textarea.value) {
                const lines = textarea.value.split('\n');
                const fontSize = 32;
                const lineHeight = fontSize * 1.4;
                ctx.globalCompositeOperation = 'source-over';
                lines.forEach((line, i) => {
                    let currentX = textPos.x;
                    const currentY = textPos.y + (i * lineHeight);
                    for (let char of line) {
                        ctx.fillText(char, currentX, currentY);
                        currentX += ctx.measureText(char).width + charSpacing;
                    }
                });
            }
            overlay.style.display = 'none';
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        
        canvas.addEventListener('touchstart', (e) => {
            if (mode !== 'hand') e.preventDefault();
            startDrawing(e);
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            if (mode !== 'hand') e.preventDefault();
            draw(e);
        }, {passive: false});
        
        window.addEventListener('touchend', stopDrawing);

        function clearCanvas() {
            if(confirm("全部消しても大丈夫？")) { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        }

        function saveImage() {
            try {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(bgImg, 0, 0);
                tempCtx.drawImage(canvas, 0, 0);
                const link = document.createElement('a');
                link.download = 'post_tool_letter.png';
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
            } catch (e) { alert("保存に失敗しました。GitHub Pagesで公開すると解決します！"); }
        }
    </script>
</body>
</html>
